<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Data - Nurfitri Master Client</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .data-section {
            margin-bottom: 30px;
        }

        .data-section h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        input[type="date"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        thead {
            background-color: #667eea;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-download {
            background-color: #667eea;
            color: white;
            flex: 1;
            min-width: 200px;
        }

        .btn-download:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-add {
            background-color: #28a745;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-add:hover {
            background-color: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            flex: none;
            width: auto;
        }

        .btn-delete:hover {
            background-color: #c82333;
        }

        .btn-reset {
            background-color: #6c757d;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-reset:hover {
            background-color: #5a6268;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.4);
        }

        .success-message {
            display: none;
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease-in;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state p {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Rekap Data Nurfitri</h1>
        <p class="subtitle">Kelola dan download data rekap dalam format Excel XLSX</p>

        <div class="success-message" id="successMessage">
            ✓ File Excel berhasil diunduh!
        </div>

        <div class="data-section">
            <h2>📝 Input Data</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Nama</label>
                    <input type="text" id="name" placeholder="Masukkan nama...">
                </div>
                <div class="form-group">
                    <label for="date">Tanggal</label>
                    <input type="date" id="date">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="category">Kategori</label>
                    <select id="category">
                        <option value="">Pilih Kategori</option>
                        <option value="Penjualan">Penjualan</option>
                        <option value="Pengeluaran">Pengeluaran</option>
                        <option value="Inventori">Inventori</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="amount">Jumlah</label>
                    <input type="number" id="amount" placeholder="0" min="0" step="0.01">
                </div>
            </div>

            <div class="form-group">
                <label for="description">Keterangan</label>
                <input type="text" id="description" placeholder="Masukkan keterangan...">
            </div>

            <div class="btn-group">
                <button class="btn-add" onclick="addData()">➕ Tambah Data</button>
                <button class="btn-reset" onclick="resetForm()">🔄 Reset</button>
            </div>
        </div>

        <div class="data-section">
            <h2>📋 Data Rekap</h2>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Total Data</div>
                    <div class="stat-value" id="totalCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Jumlah</div>
                    <div class="stat-value" id="totalAmount">Rp 0</div>
                </div>
            </div>

            <div id="tableContainer" style="margin-top: 20px;">
                <div class="empty-state">
                    <p>📭 Belum ada data. Silakan tambahkan data terlebih dahulu.</p>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-download" onclick="downloadExcel()">⬇️ Download Excel (XLSX)</button>
        </div>
    </div>

    <script>
        // Set tanggal hari ini
        document.getElementById('date').valueAsDate = new Date();

        // Data storage
        let dataTable = [];

        // Fungsi untuk menambah data
        function addData() {
            const name = document.getElementById('name').value.trim();
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const description = document.getElementById('description').value.trim();

            // Validasi
            if (!name || !date || !category || amount === 0) {
                alert('⚠️ Harap isi semua field dengan benar!');
                return;
            }

            // Tambah ke data
            dataTable.push({
                no: dataTable.length + 1,
                nama: name,
                tanggal: new Date(date).toLocaleDateString('id-ID'),
                kategori: category,
                jumlah: amount,
                keterangan: description
            });

            // Update tampilan
            renderTable();
            resetForm();
            showSuccessMessage('Data berhasil ditambahkan!');
        }

        // Fungsi untuk render tabel
        function renderTable() {
            const container = document.getElementById('tableContainer');
            
            if (dataTable.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>📭 Belum ada data. Silakan tambahkan data terlebih dahulu.</p>
                    </div>
                `;
                updateStats();
                return;
            }

            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>Tanggal</th>
                            <th>Kategori</th>
                            <th>Jumlah</th>
                            <th>Keterangan</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            dataTable.forEach((row, index) => {
                tableHTML += `
                    <tr>
                        <td>${row.no}</td>
                        <td>${row.nama}</td>
                        <td>${row.tanggal}</td>
                        <td>${row.kategori}</td>
                        <td>Rp ${row.jumlah.toLocaleString('id-ID', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                        <td>${row.keterangan}</td>
                        <td><button class="btn-delete" onclick="deleteRow(${index})">Hapus</button></td>
                    </tr>
                `;
            });

            tableHTML += `
                    </tbody>
                </table>
            `;

            container.innerHTML = tableHTML;
            updateStats();
        }

        // Fungsi untuk menghapus baris
        function deleteRow(index) {
            if (confirm('Yakin ingin menghapus data ini?')) {
                dataTable.splice(index, 1);
                // Re-number
                dataTable.forEach((row, i) => {
                    row.no = i + 1;
                });
                renderTable();
                showSuccessMessage('Data berhasil dihapus!');
            }
        }

        // Fungsi untuk update statistik
        function updateStats() {
            const totalCount = dataTable.length;
            const totalAmount = dataTable.reduce((sum, row) => sum + row.jumlah, 0);

            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('totalAmount').textContent = `Rp ${totalAmount.toLocaleString('id-ID', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        // Fungsi untuk reset form
        function resetForm() {
            document.getElementById('name').value = '';
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('category').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('name').focus();
        }

        // Fungsi untuk download Excel
        function downloadExcel() {
            if (dataTable.length === 0) {
                alert('⚠️ Tidak ada data untuk diunduh!');
                return;
            }

            // Persiapkan data untuk Excel
            const exportData = [
                ['REKAP DATA NURFITRI'],
                ['Generated on: ' + new Date().toLocaleDateString('id-ID')],
                [],
                ['No', 'Nama', 'Tanggal', 'Kategori', 'Jumlah', 'Keterangan']
            ];

            // Tambah data
            dataTable.forEach(row => {
                exportData.push([
                    row.no,
                    row.nama,
                    row.tanggal,
                    row.kategori,
                    row.jumlah,
                    row.keterangan
                ]);
            });

            // Tambah total
            const totalAmount = dataTable.reduce((sum, row) => sum + row.jumlah, 0);
            exportData.push([]);
            exportData.push(['', '', '', 'TOTAL:', totalAmount, '']);

            // Buat workbook
            const ws = XLSX.utils.aoa_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Rekap Data');

            // Set lebar kolom
            ws['!cols'] = [
                { wch: 5 },
                { wch: 20 },
                { wch: 15 },
                { wch: 15 },
                { wch: 15 },
                { wch: 25 }
            ];

            // Download
            XLSX.writeFile(wb, `Rekap_Data_${new Date().toISOString().split('T')[0]}.xlsx`);
            showSuccessMessage('✓ File Excel berhasil diunduh!');
        }

        // Fungsi untuk menampilkan pesan sukses
        function showSuccessMessage(message) {
            const msg = document.getElementById('successMessage');
            msg.textContent = message;
            msg.classList.add('show');
            setTimeout(() => {
                msg.classList.remove('show');
            }, 3000);
        }

        // Setel fokus awal
        document.getElementById('name').focus();
    </script>
</body>
</html>
